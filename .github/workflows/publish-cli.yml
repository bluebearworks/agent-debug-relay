name: Publish CLI to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Check toolchain
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check CLI package contents
        run: npm pack -w packages/cli --dry-run

      - name: Dry-run publish CLI
        if: github.event_name == 'workflow_dispatch'
        run: npm publish -w packages/cli --access public --dry-run

      - name: Publish CLI
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish -w packages/cli --access public
